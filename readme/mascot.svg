<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="wat-title wat-desc">
  <title id="wat-title">Wat, the WhatTheAgent mascot</title>
  <desc id="wat-desc">A small rounded robot named Wat, holding a magnifying glass, inspecting an AI agent's capabilities. Teal and cyan body, friendly eyes, a small antenna with a green light.</desc>

  <defs>
    <linearGradient id="wat-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wat-body-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="wat-lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="wat-lens-glass" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.18"/>
    </radialGradient>
    <filter id="wat-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <ellipse cx="120" cy="220" rx="74" ry="8" fill="#0F172A" opacity="0.18"/>

  <g transform="translate(48 14)">
    <line x1="20" y1="22" x2="20" y2="6" stroke="#0F172A" stroke-width="3" stroke-linecap="round"/>
    <circle cx="20" cy="4" r="5" fill="#34D399"/>
    <circle cx="20" cy="4" r="5" fill="#34D399" opacity="0.4">
      <animate attributeName="r" values="5;8;5" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(40 36)">
    <rect x="0" y="0" width="160" height="116" rx="34" fill="url(#wat-body)" stroke="#0F172A" stroke-width="3"/>
    <rect x="0" y="0" width="160" height="116" rx="34" fill="url(#wat-body-shadow)"/>

    <rect x="14" y="20" width="132" height="68" rx="18" fill="#0F172A"/>
    <rect x="20" y="26" width="120" height="56" rx="14" fill="#0B1220"/>

    <g>
      <circle cx="56" cy="54" r="13" fill="#F8FAFC"/>
      <circle cx="58" cy="56" r="6" fill="#0F172A">
        <animate attributeName="cx" values="58;55;58;61;58" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60" cy="52" r="2" fill="#FFFFFF"/>
    </g>

    <g>
      <circle cx="104" cy="54" r="13" fill="#F8FAFC"/>
      <circle cx="106" cy="56" r="6" fill="#0F172A">
        <animate attributeName="cx" values="106;103;106;109;106" keyTimes="0;0.25;0.5;0.75;1" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="108" cy="52" r="2" fill="#FFFFFF"/>
    </g>

    <path d="M64 76 Q80 84 96 76" stroke="#5EEAD4" stroke-width="3" fill="none" stroke-linecap="round"/>

    <circle cx="14" cy="100" r="5" fill="#0F172A"/>
    <circle cx="146" cy="100" r="5" fill="#0F172A"/>
  </g>

  <g transform="translate(126 86) rotate(28)">
    <line x1="0" y1="0" x2="36" y2="50" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
    <line x1="2" y1="-2" x2="34" y2="48" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>

    <circle cx="-22" cy="-30" r="32" fill="url(#wat-lens-glass)" stroke="#0F172A" stroke-width="4"/>
    <circle cx="-22" cy="-30" r="32" fill="none" stroke="url(#wat-lens)" stroke-width="3"/>
    <circle cx="-32" cy="-40" r="9" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="-12" cy="-22" r="3" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <g transform="translate(80 162)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="#0F172A"/>
    <ellipse cx="0" cy="-1" rx="17" ry="8" fill="url(#wat-body)"/>
  </g>
  <g transform="translate(160 162)">
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="#0F172A"/>
    <ellipse cx="0" cy="-1" rx="17" ry="8" fill="url(#wat-body)"/>
  </g>

  <g transform="translate(34 130)">
    <rect x="-2" y="-4" width="14" height="8" rx="3" fill="#0F172A"/>
    <circle cx="-6" cy="0" r="6" fill="url(#wat-body)" stroke="#0F172A" stroke-width="3"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="9" fill="#5EEAD4" font-weight="700" filter="url(#wat-soft)" opacity="0.85">
    <text x="40" y="194">capability</text>
    <text x="124" y="208">chain</text>
  </g>
</svg>
