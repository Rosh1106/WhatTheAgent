<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="wta-tiers-title wta-tiers-desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="wta-tiers-title">What WhatTheAgent shows you</title>
  <desc id="wta-tiers-desc">Three tiers of findings: Inventory (informational, calm), Needs attention (review or acknowledge), and Risk chains (critical combinations such as credential access plus external send).</desc>

  <defs>
    <linearGradient id="tier-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="tier-info" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="tier-warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="tier-crit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="18" fill="url(#tier-bg)"/>

  <text x="48" y="48" fill="#F8FAFC" font-size="22" font-weight="800" letter-spacing="-0.2">Three tiers, not one big alarm.</text>
  <text x="48" y="74" fill="#94A3B8" font-size="14" font-weight="500">Findings are categorised so you can ignore noise and focus on what matters.</text>

  <g transform="translate(48 110)">
    <rect width="350" height="270" rx="14" fill="#0F1F2A" stroke="#155E75" stroke-width="1.5"/>
    <rect width="6" height="270" rx="3" fill="url(#tier-info)"/>
    <text x="28" y="36" fill="#5EEAD4" font-size="11" font-weight="800" letter-spacing="2.5">INVENTORY</text>
    <text x="28" y="64" fill="#F8FAFC" font-size="20" font-weight="800">Just so you know.</text>
    <text x="28" y="92" fill="#CBD5E1" font-size="13" font-weight="500">Capabilities your agent has,</text>
    <text x="28" y="110" fill="#CBD5E1" font-size="13" font-weight="500">on their own, with no risky</text>
    <text x="28" y="128" fill="#CBD5E1" font-size="13" font-weight="500">combination. Informational.</text>
    <g transform="translate(28 154)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#1E3A45"/>
      <circle cx="16" cy="16" r="4" fill="#5EEAD4"/>
      <text x="32" y="21" fill="#E2E8F0" font-size="12" font-weight="600">read_file · summarize-notes.py</text>
    </g>
    <g transform="translate(28 194)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#1E3A45"/>
      <circle cx="16" cy="16" r="4" fill="#5EEAD4"/>
      <text x="32" y="21" fill="#E2E8F0" font-size="12" font-weight="600">network_access · github MCP</text>
    </g>
    <text x="28" y="252" fill="#64748B" font-size="11" font-weight="600" letter-spacing="0.5">→ no action needed</text>
  </g>

  <g transform="translate(425 110)">
    <rect width="350" height="270" rx="14" fill="#231708" stroke="#92400E" stroke-width="1.5"/>
    <rect width="6" height="270" rx="3" fill="url(#tier-warn)"/>
    <text x="28" y="36" fill="#FBBF24" font-size="11" font-weight="800" letter-spacing="2.5">NEEDS ATTENTION</text>
    <text x="28" y="64" fill="#F8FAFC" font-size="20" font-weight="800">Decide once, move on.</text>
    <text x="28" y="92" fill="#CBD5E1" font-size="13" font-weight="500">Powerful capability that's</text>
    <text x="28" y="110" fill="#CBD5E1" font-size="13" font-weight="500">often legitimate (Burp, GitHub</text>
    <text x="28" y="128" fill="#CBD5E1" font-size="13" font-weight="500">MCP). Acknowledge or fix.</text>
    <g transform="translate(28 154)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#3B2410"/>
      <circle cx="16" cy="16" r="4" fill="#FBBF24"/>
      <text x="32" y="21" fill="#E2E8F0" font-size="12" font-weight="600">execute_code · burp MCP</text>
    </g>
    <g transform="translate(28 194)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#3B2410"/>
      <circle cx="16" cy="16" r="4" fill="#FBBF24"/>
      <text x="32" y="21" fill="#E2E8F0" font-size="12" font-weight="600">credential_access · GH_TOKEN</text>
    </g>
    <text x="28" y="252" fill="#A16207" font-size="11" font-weight="600" letter-spacing="0.5">→ approve in policy or scope it</text>
  </g>

  <g transform="translate(802 110)">
    <rect width="350" height="270" rx="14" fill="#1F0A0A" stroke="#7F1D1D" stroke-width="1.5"/>
    <rect width="6" height="270" rx="3" fill="url(#tier-crit)"/>
    <text x="28" y="36" fill="#F87171" font-size="11" font-weight="800" letter-spacing="2.5">RISK CHAIN</text>
    <text x="28" y="64" fill="#F8FAFC" font-size="20" font-weight="800">Investigate now.</text>
    <text x="28" y="92" fill="#CBD5E1" font-size="13" font-weight="500">A specific combination of</text>
    <text x="28" y="110" fill="#CBD5E1" font-size="13" font-weight="500">capabilities whose blast radius</text>
    <text x="28" y="128" fill="#CBD5E1" font-size="13" font-weight="500">is bigger than its parts.</text>
    <g transform="translate(28 154)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#3F1414"/>
      <text x="14" y="21" fill="#E2E8F0" font-size="11" font-weight="700">credential_access</text>
      <text x="125" y="21" fill="#F87171" font-weight="900">+</text>
      <text x="138" y="21" fill="#E2E8F0" font-size="11" font-weight="700">external_send</text>
      <text x="234" y="21" fill="#F87171" font-size="10" font-weight="800" letter-spacing="0.5">EXFIL</text>
    </g>
    <g transform="translate(28 194)">
      <rect width="294" height="32" rx="6" fill="#0B1220" stroke="#3F1414"/>
      <text x="14" y="21" fill="#E2E8F0" font-size="11" font-weight="700">approval_bypass</text>
      <text x="125" y="21" fill="#F87171" font-weight="900">+</text>
      <text x="138" y="21" fill="#E2E8F0" font-size="11" font-weight="700">external_send</text>
      <text x="222" y="21" fill="#F87171" font-size="10" font-weight="800" letter-spacing="0.5">SILENT</text>
    </g>
    <text x="28" y="252" fill="#B91C1C" font-size="11" font-weight="600" letter-spacing="0.5">→ add a guardrail before next run</text>
  </g>
</svg>
